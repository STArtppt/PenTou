name: ✨ 功能建议 / Feature request
description: 提出一个新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        在提之前，请先确认你的诉求与 PenTou 的设计哲学一致：
        - 本地优先：不引入云依赖
        - 单用户单密码：不引入多用户 / 团队功能
        - 轻量：不引入重的 UI 组件库

  - type: textarea
    id: pain
    attributes:
      label: 痛点 / Pain
      description: 你在什么场景下遇到了什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposal
      description: 你希望 PenTou 怎么做？最好附上 UI 草图或行为描述。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives
      description: 你考虑过哪些其他做法？为什么放弃了？

  - type: textarea
    id: scope
    attributes:
      label: 影响面 / Scope
      description: 这个功能涉及前端 / 后端 / 数据格式哪些部分？会破坏现有数据吗？
